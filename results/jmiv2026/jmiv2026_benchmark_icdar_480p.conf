# Example configuration for the current benchmark surface.
# Each line uses `key=value` or `key: value`. Comments start with `#`.

# Images (repeat `image=` or use a glob with `*`)
image=/Users/wonderalexandre/GitHub/MorphoTreeAdjust/dev-tools/dat/icdar_480p/*.png

# Methods (repeat `method=` or use the `methods=` list)
#method=naive
#method=our_subtree

# Measurement parameters
repeat=3
warmup=1

# Algorithm parameters
radio_adj=1.5
# attribute: area | bbox_width | bbox_height | bbox_diagonal (bbox=diagonal)
attribute=area

# 480p
thresholds=10, 20, 30, 40, 49, 59, 69, 79, 89, 99, 109, 119, 128, 138, 148, 158, 168, 178, 188, 198, 207, 217, 227, 237, 247, 257, 267, 277, 286, 296, 306, 316, 326, 336, 346, 356, 365, 375, 385, 395, 405, 415, 425, 435, 444, 454, 464, 474, 484, 494

# Output control
quiet=false
json=true
no_validate=true
validate_only=false


