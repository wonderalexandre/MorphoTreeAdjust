# Example configuration for the current benchmark surface.
# Each line uses `key=value` or `key: value`. Comments start with `#`.

# Images (repeat `image=` or use a glob with `*`)
image=/Users/wonderalexandre/GitHub/MorphoTreeAdjust/dev-tools/dat/icdar_1080p/*.png

# Methods (repeat `method=` or use the `methods=` list)
#method=naive
#method=our_subtree

# Measurement parameters
repeat=3
warmup=1

# Algorithm parameters
radio_adj=1.5
# attribute: area | bbox_width | bbox_height | bbox_diagonal (bbox=diagonal)
attribute=area

# Example threshold lists used in larger previous runs:
