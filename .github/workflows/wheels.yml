name: Wheels

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional version override for backfilling wheels, e.g. 0.4.0"
        required: false
        type: string
  push:
    tags:
      - "v*"
      - "morphoTreeAdjust-v*"

permissions:
  contents: read

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-wheels:
    name: wheels-${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            cibw-archs: x86_64
          - os: windows-latest
            label: windows-amd64
            cibw-archs: AMD64
          - os: macos-15-intel
            label: macos-x86_64
            cibw-archs: x86_64
          - os: macos-14
            label: macos-arm64
            cibw-archs: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version override
        if: ${{ github.event.inputs.release_version != '' }}
        shell: bash
        run: |
          echo "CIBW_ENVIRONMENT=SETUPTOOLS_SCM_PRETEND_VERSION=${{ github.event.inputs.release_version }}" >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS: ${{ matrix.cibw-archs }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.label }}
          path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine setuptools-scm

      - name: Set version override
        if: ${{ github.event.inputs.release_version != '' }}
        run: |
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=${{ github.event.inputs.release_version }}" >> "$GITHUB_ENV"

      - name: Show inferred version
        run: python -m setuptools_scm

      - name: Build sdist
        run: python -m build --sdist

      - name: Check sdist
        run: python -m twine check --strict dist/*

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*
